name: Deploy Frontend to AWS S3 + CloudFront

on:
  push:
    branches:
      - main
    paths:
      - 'public/**'
      - 'index.html'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch:  # Allow manual trigger from GitHub UI

jobs:
  deploy:
    name: Deploy to S3 & Invalidate CloudFront
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Sync public/ folder to S3 bucket
        run: |
          aws s3 sync public/ s3://${{ secrets.S3_BUCKET_NAME }}/ \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "*.html" \
            --exclude "uploads/*"

          # HTML files — no cache so users always get latest
          aws s3 sync public/ s3://${{ secrets.S3_BUCKET_NAME }}/ \
            --delete \
            --cache-control "no-cache, no-store, must-revalidate" \
            --include "*.html" \
            --exclude "*"

          # Root index.html
          aws s3 cp index.html s3://${{ secrets.S3_BUCKET_NAME }}/index.html \
            --cache-control "no-cache, no-store, must-revalidate"

      - name: Invalidate CloudFront cache
        if: ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID != '' }}
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"

      - name: Deployment summary
        run: |
          echo "✅ Frontend deployed to S3 bucket: ${{ secrets.S3_BUCKET_NAME }}"
          echo "🌐 CloudFront invalidation triggered"
